<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MicroHarness Python</title>
  <desc id="desc">Professional gradient banner for the MicroHarness Python project</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.42"/>
      <stop offset="46%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="145" y1="112" x2="1055" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="34%" stop-color="#60a5fa"/>
      <stop offset="68%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="240" y1="272" x2="960" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="25%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="75%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.40"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#38bdf8" flood-opacity="0.30"/>
    </filter>
    <filter id="chipGlow" x="-20%" y="-80%" width="140%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38bdf8" flood-opacity="0.26"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#94a3b8" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="34" fill="#020617"/>
  <rect width="1200" height="360" rx="34" fill="url(#bgGlow)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <path d="M84 78C196 20 288 76 398 54C524 29 576 88 692 67C817 45 895 10 1110 58" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M90 293C252 252 328 316 466 288C612 258 688 294 824 268C936 247 1014 236 1110 272" stroke="#c084fc" stroke-opacity="0.20" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <text x="600" y="166" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="88" font-weight="850" letter-spacing="-4" fill="url(#titleGradient)">MicroHarness</text>
    <text x="600" y="235" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="760" letter-spacing="6" fill="#e0f2fe">PYTHON</text>
  </g>

  <rect x="386" y="270" width="428" height="38" rx="19" fill="#0f172a" fill-opacity="0.76" stroke="#38bdf8" stroke-opacity="0.32" filter="url(#chipGlow)"/>
  <text x="600" y="295" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650" letter-spacing="2.5" fill="#bae6fd">AGENT HARNESS · FASTAPI · AG-UI</text>

  <line x1="240" y1="255" x2="960" y2="255" stroke="url(#lineGradient)" stroke-width="2"/>
  <circle cx="166" cy="108" r="5" fill="#67e8f9" fill-opacity="0.8"/>
  <circle cx="1044" cy="105" r="5" fill="#f0abfc" fill-opacity="0.8"/>
  <circle cx="1086" cy="222" r="3" fill="#93c5fd" fill-opacity="0.8"/>
  <circle cx="118" cy="238" r="3" fill="#c4b5fd" fill-opacity="0.8"/>
</svg>
